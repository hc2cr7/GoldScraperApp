name: Build APK
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Buildozer and Dependencies
        run: |
          pip3 install --user buildozer
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
          
      - name: Create Custom Bulletproof Buildozer Spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = Gold Scraper
          package.name = goldscraper
          package.domain = org.gold
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.1
          requirements = python3,kivy,requests,beautifulsoup4,urllib3,idna,certifi,charset-normalizer
          orientation = portrait
          osx.kivy_version = 2.3.0
          fullscreen = 1
          android.archs = arm64-v8a
          android.allow_backup = True
          
          # Stable Android SDK/NDK mapping to guarantee compile success
          android.api = 33
          android.minapi = 24
          android.ndk = 25b
          android.accept_sdk_license = True
          android.skip_apk_rescale = True
          
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF
          
      - name: Build with Buildozer
        run: ~/.local/bin/buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
