name: Build APK
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Force Ubuntu 22.04 to avoid the nasty compiler header bugs on 24
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Buildozer and Dependencies
        run: |
          pip3 install --user buildozer
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
          
      - name: Generate Spec
        run: ~/.local/bin/buildozer init
        
      - name: Update Spec Requirements & Natively Accept License
        run: |
          # 1. Inject your script dependencies
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests,beautifulsoup4/' buildozer.spec
          # 2. Toggle the native license acceptance configuration
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
      - name: Build with Buildozer
        # The ultimate insurance policy: pipes "yes" to any hidden console questions
        run: yes | ~/.local/bin/buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
